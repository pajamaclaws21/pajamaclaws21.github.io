<!DOCTYPE html>
<html>
<head>
</head>
<body>

<iframe id="snap" src="https://www.pajamaclaws.net/Snap/snap.html#open:https://www.pajamaclaws.net/Snap/Examples/export%20to%20js.xml"
width="50%" height="50%" style="resize: both;"></iframe><br>

<p id="0"></p>

<input id="func" placeholder="function">
<input id="ident" placeholder="identifier">
<button onclick="

var ident = document.getElementById('ident').value;
ide.setVar('function', document.getElementById('func').value);
ide.broadcast(`parse${ident}`);
alert(ide.getVar('output').asArray()[0]);

//setInterval(()=>{



//}, 500);

// continue to check list for identifier until we find one

">Parse</button>

<script>
var iframe, ide, p;

window.addEventListener("load", (event) => {
    iframe = document.getElementById('snap');
    p = document.getElementById('0');

    setTimeout(() => {
        try {
            ide = iframe.contentWindow.world.children[0];
            p.innerText = ide;
        } catch (err) {
            p.innerText = err;
            // Try again...
            // Unless callback is >5 in which case cancel
        };
    }, 2000);
});

</script>

</body>
</html>
