<!DOCTYPE html>
<html>
<head>
</head>
<body>

<iframe id="snap" src="https://www.pajamaclaws.net/Snap/snap.html#open:https://www.pajamaclaws.net/Snap/Examples/export%20to%20js.xml"
width="50%" height="50%" style="resize: both;"></iframe><br>

<script>
var snapWindow = document.getElementById('snap');
var ide = false;

window.addEventListener("load", (event) => {
    var loop;
    loop = setInterval(() => {
        try {
            ide = snapWindow.contentWindow.world.children[0];
            clearInterval(loop);
        } catch (err) {
            console.err(err);
        };
    }, 100);
});

function callSnap(functionName, inputs, identifier){
    var result, loop;
    ide.setVar('function', functionName);
    ide.setVar('input', ide.newList(inputs)); // I dunno abt this one
    ide.broadcast(`parse${identifier}`);

    return new Promise((resolve, reject) => {
        loop = setInterval(()=>{
            result = JSON.parse(ide.getVar('snap exports: output').asJSON());
            if(Object.hasOwn(result, identifier)){
                clearInterval(loop);
                resolve(result[identifier])
            }
        }, 100);
    });
}
</script>

</body>
</html>
