<!DOCTYPE html>
<html>
<head>
</head>
<body>

<iframe id="snap" src="https://www.pajamaclaws.net/Snap/snap.html"
width="50%" height="50%" style="resize: both;"></iframe><br>

<button onclick="">Get var api</button>

<p id="0"></p>

<script>
var iframe, ide, p;

function initIde(){
iframe = document.getElementById('snap');
p = document.getElementById('0');

try {
var ide = iframe.contentWindow.world.children[0];
p.innerText = ide;
} catch (err) {
p.innerText = err;
};

}

window.addEventListener("load", (event) => {
setTimeout(initIde, 3000);
});

</script>

</body>
</html>
