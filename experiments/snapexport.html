<!DOCTYPE html>
<html>
<head>
    <title>Export Snap! --> JS</title>
    <meta charset="utf-8">
</head>
<body>

<iframe id="snap" src="https://www.pajamaclaws.net/Snap/snap.html#open:https://www.pajamaclaws.net/Snap/Examples/export%20to%20js.xml"
width="50%" height="50%" style="resize: both;"></iframe><br>

<p>Try out running functions from Snap<em>!</em>:</p>
<input id="functionName-example" placeholder="function name">
<input id="id-example" placeholder="identifier">
<button onclick="

let func = document.getElementById('functionName-example').value;
let id = document.getElementById('id-example').value;
let log = document.getElementById('output-example');

callSnap(func, '', id).then((output) => {
    log.innerText += `\nThe output to ${func}:${id} was ${output}`;
});

">Try it out!</button>
<p id="output-example"></p>

<script>
var ide = false;
var snapWindow = document.getElementById('snap'); // Change this to the ID of your iFrame

// load the Snap! IDE (for API access) into ide variable
// every 100ms after the window loads, check if you can access the IDE
window.addEventListener("load", (event) => {
    var loop;
    loop = setInterval(() => {
        try {
            ide = snapWindow.contentWindow.world.children[0];
            clearInterval(loop);
        } catch (err) {
            console.err(err);
        };
    }, 100);
});

// callSnap: call Snap! functions in JS from same-origin frames
// does the same thing as callSnapC from /experiments/snapcross.html
function callSnap(functionName, inputs, identifier){
    var result, loop;
    ide.setVar('snap exports: function name', functionName);
    ide.setVar('snap exports: input', ide.newList(inputs)); // I dunno abt this one
    ide.broadcast(`parse${identifier}`);

    return new Promise((resolve, reject) => {
        // every 100ms, see if the function has returned a value
        loop = setInterval(()=>{
            result = JSON.parse(ide.getVar('snap exports: output').asJSON());
            if(Object.hasOwn(result, identifier)){
                clearInterval(loop);
                resolve(result[identifier])
            }
        }, 100);
    });
}
</script>

</body>
</html>
