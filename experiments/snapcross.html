<!DOCTYPE html>
<html>
<head>
    <title>Cross-Origin Snap! API</title>
    <meta charset="utf-8">
</head>
<body>

<iframe id="snap" src="https://snap.berkeley.edu/snap/snap.html#present:Username=pajamaclaws21&ProjectName=export%20to%20js" style="width: 80vw; height: 40vh; resize: both;"></iframe><br>

<p>Try out calling the Snap<em>!</em> API on a cross-origin frame:</p>
<button onclick="
snapAPI('getVar', ['foo']).then((response) => {alert(response)});
">Get the "foo" variable</button>

<br><br>

<p>Try out running functions from Snap<em>!</em> on a cross-origin frame:</p>
<input id="func" placeholder="function name">
<input id="id" placeholder="identifier">
<button onclick="

let func = document.getElementById('func').value;
let id = document.getElementById('id').value;
let log = document.getElementById('log');

callSnapC(func, '', id).then((output) => {
    log.innerText += `\nThe output to ${func}:${id} was ${output}`;
});

">Run</button>
<p id="log"></p>


<script>
var snapWindow = document.getElementById('snap'); // Change this to the ID of your iFrame
var crossIDE = false;
var crossOutput;
const waitingValue = "JAVASCRIPT IS WAITING ON AN OUTPUT";

// load the Snap! contentwindow (for API access) into crossIDE variable
// every 100ms after the window loads, check if you can access the contentWindow
window.addEventListener("load", (event) => {
    var loop;
    loop = setInterval(() => {
        try {
            crossIDE = snapWindow.contentWindow;
            clearInterval(loop);
        } catch (err) {
            console.err(err);
        };
    }, 100);
});

// when Snap! responds to API call, store it in crossOutput
window.addEventListener('message', (event) => {
    crossOutput = event.data.response;
}, false);

// call the Snap! API on cross-origin frames
// designed for only 1 request at a time -- link through .then; see callSnapC
function snapAPI(sel, par){
    var loop;
    crossOutput = waitingValue;
    crossIDE.postMessage({selector: sel, params: par}, "*"); // send message to IDE
    // every 100ms, see if the API call has been answered
    return new Promise((resolve, reject) => {
        loop = setInterval(()=>{
            if (crossOutput != waitingValue){
                clearInterval(loop); // end the loop
                resolve(crossOutput);
            }
        });
    }, 100);
};

// To-do: implement functionality to turn multi-dimensional JS arrays --> Snap! lists
// ... and vice-versa

// callSnapC: call Snap! functions in JS from cross-origin frames
// having to use promises makes this function look super ugly but I hope it is readable
// does the same thing as callSnap from /experiments/snapexport.html
function callSnapC(functionName, inputs, identifier){
    var result, loop;
    snapAPI('setVar', ['snap exports: function name', functionName]).then(()=>{
    snapAPI('setVar', ['snap exports: input', inputs]).then(()=>{
    snapAPI('broadcast', [`parse${identifier}`]).then(()=>{
    
    return new Promise((resolve, reject) => {
        // every 100ms, see if the function has returned a value
        loop = setInterval(()=>{
            snapAPI('getVar', ['snap exports: output']).then((value) => {
                alert(JSON.stringify(value.find((element) => element["contents"][0] == identifier)));
                result = JSON.parse(JSON.stringify(value));
                if(Object.hasOwn(result, identifier)){
                    clearInterval(loop);
                    resolve(result[identifier]);
                }
            });
        }, 1000);
    });

    });});});
}
</script>

</body>
</html>
