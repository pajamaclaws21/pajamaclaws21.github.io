<!DOCTYPE html>
<html>
<head>
    <title>Cross-Origin Snap! API</title>
    <meta charset="utf-8">
</head>
<body>

<iframe id="snap" src="https://snap.berkeley.edu/snap/snap.html#present:Username=pajamaclaws21&ProjectName=Snap!%20API%20Cross-Origin%20Example"
width="50%" height="50%" style="resize: both;"></iframe><br>

<button onclick="
snapAPI('getVar', ['foo']).then((response) => {alert(response)});
">Try getting the "foo" variable!</button>

<script>
var crossIDE = false;
var crossOutput;
var snapWindow = document.getElementById('snap'); // Change this to the ID of your iFrame

// load the Snap! contentwindow (for API access) into crossIDE variable
// every 100ms after the window loads, check if you can access the contentWindow
window.addEventListener("load", (event) => {
    var loop;
    loop = setInterval(() => {
        try {
            crossIDE = snapWindow.contentWindow;
            clearInterval(loop);
        } catch (err) {
            console.err(err);
        };
    }, 100);
});

// when Snap! responds to API call, store it in crossOutput
window.addEventListener('message', (event) => {
    crossOutput = event.data.response;
}, false);

// call the Snap! API on cross-origin frames
// designed for only 1 request at a time -- link through .then; see callSnapC
function snapAPI(sel, par){
    var loop;
    crossOutput = false;
    crossIDE.postMessage({selector: sel, params: par}, "*"); // send message to IDE
    // every 100ms, see if the API call has been answered
    return new Promise((resolve, reject) => {
        loop = setInterval(()=>{
            if (crossOutput){
                clearInterval(loop); // end the loop
                resolve(crossOutput);
            }
        });
    }, 100);
};

// callSnapC: call Snap! functions in JS from cross-origin frames
// having to use promises makes this function look super ugly but I hope it is readable
// does the same thing as callSnap from /experiments/snapexport.html
function callSnapC(functionName, inputs, identifier){
    var result, loop;
    snapAPI('setVar', ['snap exports: function name', 'functionName']).then(()=>{
    snapAPI('setVar', ['snap exports: input', ide.newList(inputs)]).then(()=>{
    snapAPI('broadcast', [`parse${identifier}`]).then(()=>{
    
    return new Promise((resolve, reject) => {
        // every 100ms, see if the function has returned a value
        loop = setInterval(()=>{
            snapAPI('getVar', ['snap exports: output']).then((value) => {
                result = JSON.parse(value).asJSON();
                if(Object.hasOwn(result, identifier)){
                    clearInterval(loop);
                    resolve(result[identifier]);
                }
            });
        }, 100);
    });

    });});});
}
</script>

</body>
</html>
